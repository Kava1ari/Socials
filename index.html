<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Links | Kava1ari</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f0f4f8; 
            --text-color: #1a1a1a;
            --bio-text-color: #555;
            --container-bg: rgba(255, 255, 255, 0.92); 
            --btn-text-color: #ffffff;
            
            /* Markenfarben */
            --color-twitch: #9146FF;
            --color-youtube: #FF0000;
            --color-tiktok: #000000;
            --color-instagram: #E1306C;
            --color-twitter-x: #000000;
            --color-discord: #5865F2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            position: relative; 
            overflow-x: hidden; 
        }

        /* Hintergrundbild */
        body::before {
            content: "";
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Hintergrund.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            opacity: 0.3; 
            z-index: -1; 
        }

        .page-content {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            padding: 40px 20px;
            z-index: 1; 
        }

        /* LAYOUT FÜR PC */
        .main-wrapper {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            max-width: 1300px; 
        }

        .links-container, .game-container {
            background: var(--container-bg);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            backdrop-filter: blur(5px); 
            border: 1px solid rgba(255,255,255,0.3); 
        }

        /* Box 1: Links */
        .links-container {
            text-align: center;
            width: 100%;
            max-width: 460px;
            padding: 50px 30px 40px 30px;
            flex: 1;
        }

        /* Box 2: Das Spiel */
        .game-container {
            width: 100%;
            max-width: 700px; 
            padding: 40px 30px;
            text-align: center;
            flex: 1.4;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* PROFILBILD */
        .profile-header { margin-bottom: 40px; }
        .profile-img {
            width: 340px; 
            height: 340px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #000000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .profile-img:hover { transform: scale(1.05) rotate(2deg); }

        h1 { margin: 20px 0 5px 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
        .bio { color: var(--bio-text-color); font-size: 1.1rem; margin-bottom: 0; font-weight: 500; line-height: 1.5; }

        /* LINKS */
        .links { display: flex; flex-direction: column; gap: 14px; }
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--btn-text-color);
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .link-btn:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .link-btn i { margin-right: 15px; font-size: 1.5rem; width: 30px; text-align: center; }

        /* Button Farben */
        .btn-twitch { background-color: var(--color-twitch); }
        .btn-youtube { background-color: var(--color-youtube); }
        .btn-tiktok { background-color: var(--color-tiktok); }
        .btn-instagram { background-color: var(--color-instagram); }
        .btn-twitter { background-color: var(--color-twitter-x); }
        .btn-discord { background-color: var(--color-discord); }

        /* --- SPIEL OVERLAY CSS --- */
        .canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px; 
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.05);
            border: 3px solid #eee;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            background: #f9f9f9;
            cursor: pointer;
        }

        /* HIER ANGEPASST: Kein Blur mehr, nur noch sehr leicht durchsichtig weiß */
        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4); /* Heller Schleier, klare Vorschau */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .play-btn {
            background-color: var(--color-twitch);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(145, 70, 255, 0.6);
        }

        .play-btn:hover { transform: scale(1.05); background-color: #7a38e0; }
        
        /* Titel im Overlay mit Textschatten, damit er auch auf hellem Hintergrund lesbar ist */
        #overlayTitle { 
            margin: 0 0 15px 0; 
            font-size: 2rem; 
            font-weight: 900; 
            color: #1a1a1a; 
            text-shadow: 0 2px 10px rgba(255,255,255,0.8);
        }

        /* Responsive: Handy & Tablet */
        @media (max-width: 950px) {
            .page-content { padding: 20px 10px; }
            .main-wrapper { flex-direction: column; align-items: center; gap: 20px; }
            .profile-img { width: 250px; height: 250px; }
            .game-container { padding: 30px 15px; }
            .canvas-wrapper { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="page-content">
        <div class="main-wrapper">
            
            <div class="links-container">
                <div class="profile-header">
                    <img src="Profilbild.png" alt="Profilbild Kava1ari" class="profile-img">
                    <h1>Kava1ari</h1>
                    <p class="bio">Hey, folgend sind meine vorhandenen Social-Media Kanäle <br>--Kava1ari--</p>
                </div>

                <div class="links">
                    <a href="https://twitch.tv/kava1ari" class="link-btn btn-twitch" target="_blank">
                        <i class="fab fa-twitch"></i> Twitch
                    </a>
                    <a href="https://www.youtube.com/channel/UC4V-PtJnd8RHbO6JhqjyIDw" class="link-btn btn-youtube" target="_blank">
                        <i class="fab fa-youtube"></i> YouTube
                    </a>
                    <a href="https://www.tiktok.com/@kava1ari" class="link-btn btn-tiktok" target="_blank">
                        <i class="fab fa-tiktok"></i> TikTok
                    </a>
                    <a href="https://instagram.com/kava1ari" class="link-btn btn-instagram" target="_blank">
                        <i class="fab fa-instagram"></i> Instagram
                    </a>
                    <a href="https://twitter.com/kava1ari" class="link-btn btn-twitter" target="_blank">
                        <i class="fab fa-x-twitter"></i> Twitter / X
                    </a>
                    <a href="DEIN_DISCORD_INVITE_LINK" class="link-btn btn-discord" target="_blank">
                        <i class="fab fa-discord"></i> Discord
                    </a>
                </div>
            </div>

            <div class="game-container">
                <h3 style="margin: 0 0 10px 0; font-weight: 800; font-size: 1.6rem;">Escape the Banhammer!</h3>
                <p style="font-size: 1rem; color: #666; margin-bottom: 20px;">Highscore: <span id="highscore" style="font-weight: 700; color: #9146FF; font-size: 1.3rem;">0</span></p>

                <div class="canvas-wrapper">
                    <div id="gameOverlay" class="game-overlay">
                        <h2 id="overlayTitle">Bereit?</h2>
                        <button id="playBtn" class="play-btn"><i class="fas fa-play"></i> Start</button>
                    </div>

                    <canvas id="gameCanvas" width="600" height="400"></canvas>
                </div>

                <script>
                    const canvas = document.getElementById('gameCanvas');
                    const ctx = canvas.getContext('2d');
                    const highscoreDisplay = document.getElementById('highscore');
                    const gameOverlay = document.getElementById('gameOverlay');
                    const playBtn = document.getElementById('playBtn');
                    const overlayTitle = document.getElementById('overlayTitle');
                    
                    const playerImg = new Image();
                    playerImg.src = 'Profilbild.png'; 

                    const obstacleImg = new Image();
                    obstacleImg.src = 'Bannhammer.png'; 

                    let score = 0;
                    let highscore = 0;
                    let isPlaying = false; 

                    // --- PHYSIK WIEDER ANGEPASST (DEUTLICH HÖHERER SPRUNG) ---
                    // jumpForce auf 20 erhöht für einen viel höheren Sprung
                    // gravity auf 0.85 gesetzt, damit man nicht zu schwerfällig wirkt
                    const player = { x: 50, y: 265, width: 85, height: 85, dy: 0, jumpForce: 20, gravity: 0.85, grounded: false };
                    const obstacle = { x: 650, y: 265, width: 85, height: 85, speed: 5 };

                    function draw() {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);

                        // Boden
                        ctx.fillStyle = "#e0e0e0";
                        ctx.fillRect(0, 350, canvas.width, 50); 

                        // Spieler
                        if (playerImg.complete && playerImg.naturalWidth !== 0) {
                            ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
                        } else {
                            ctx.fillStyle = "#9146FF";
                            ctx.fillRect(player.x, player.y, player.width, player.height);
                        }

                        // Hindernis
                        if (obstacleImg.complete && obstacleImg.naturalWidth !== 0) {
                            ctx.drawImage(obstacleImg, obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                        } else {
                            ctx.fillStyle = "#FF0000";
                            ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                        }

                        if (isPlaying) {
                            player.y += player.dy;
                            
                            if (player.y + player.height < 350) {
                                player.dy += player.gravity;
                                player.grounded = false;
                            } else {
                                player.y = 350 - player.height;
                                player.dy = 0;
                                player.grounded = true;
                            }

                            obstacle.x -= obstacle.speed;
                            if (obstacle.x < -obstacle.width) {
                                obstacle.x = canvas.width + Math.random() * 200; 
                                score++;
                                if (score > highscore) {
                                    highscore = score;
                                    highscoreDisplay.innerText = highscore;
                                }
                                obstacle.speed += 0.05; 
                            }

                            // Kollision prüfen
                            if (player.x < obstacle.x + obstacle.width - 15 &&
                                player.x + player.width - 15 > obstacle.x &&
                                player.y < obstacle.y + obstacle.height - 15 &&
                                player.y + player.height - 15 > obstacle.y) {
                                
                                isPlaying = false;
                                
                                gameOverlay.style.display = 'flex';
                                overlayTitle.innerText = 'Game Over!';
                                overlayTitle.style.color = '#FF0000';
                                playBtn.innerHTML = '<i class="fas fa-redo"></i> Erneut spielen';
                            }
                        }

                        requestAnimationFrame(draw);
                    }

                    playBtn.addEventListener('click', () => {
                        score = 0;
                        obstacle.x = canvas.width + 50;
                        obstacle.speed = 5;
                        player.y = 350 - player.height;
                        player.dy = 0;
                        
                        gameOverlay.style.display = 'none';
                        isPlaying = true;
                    });

                    function jump() {
                        if (isPlaying && player.grounded) {
                            player.dy = -player.jumpForce;
                        }
                    }

                    canvas.addEventListener('mousedown', jump);
                    canvas.addEventListener('touchstart', (e) => {
                        if (isPlaying) {
                            e.preventDefault(); 
                            jump();
                        }
                    }, {passive: false});

                    draw();
                </script>
            </div>
        </div>

    </div> 

</body>
</html>
