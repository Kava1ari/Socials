<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Links | Social Bio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f0f4f8;
            --text-color: #1a1a1a;
            --bio-text-color: #555;
            --container-bg: #ffffff;
            --btn-text-color: #ffffff;
            
            /* Markenfarben */
            --color-twitch: #9146FF;
            --color-youtube: #FF0000;
            --color-tiktok: #000000;
            --color-instagram: #E1306C;
            --color-twitter-x: #000000;
            --color-discord: #5865F2;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 420px;
            background: var(--container-bg);
            padding: 60px 30px 40px 30px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* BILD NOCH GRÖSSER */
        .profile-header {
            margin-bottom: 40px;
        }

        .profile-img {
            width: 400px; /* Von 130px auf 160px erhöht */
            height: 400px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #000000; /* Dickerer weißer Rahmen */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); /* Tieferer Schatten */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile-img:hover {
            transform: scale(1.08) rotate(2deg);
        }

        h1 { margin: 20px 0 5px 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
        .bio { color: var(--bio-text-color); font-size: 1.1rem; margin-bottom: 0; font-weight: 500; }

        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--btn-text-color);
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .link-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .link-btn i {
            margin-right: 15px;
            font-size: 1.5rem;
            width: 30px;
            text-align: center;
        }

        /* Button Farben */
        .btn-twitch { background-color: var(--color-twitch); }
        .btn-youtube { background-color: var(--color-youtube); }
        .btn-tiktok { background-color: var(--color-tiktok); }
        .btn-instagram { background-color: var(--color-instagram); }
        .btn-twitter { background-color: var(--color-twitter-x); }
        .btn-discord { background-color: var(--color-discord); }

        @media (max-width: 480px) {
            .profile-img { width: 140px; height: 140px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-header">
            <img src="Profilbild.png" alt="Profilbild" class="profile-img">
            <h1>Kava1ari</h1>
            <p class="bio">Hey, folgend sind meine vorhandenen Social-Media Kanäle</p>
        </div>

        <div class="links">
            <a href="https://twitch.tv/kava1ari" class="link-btn btn-twitch" target="_blank">
                <i class="fab fa-twitch"></i> Twitch
            </a>

            <a href="https://www.youtube.com/channel/UC4V-PtJnd8RHbO6JhqjyIDw" class="link-btn btn-youtube" target="_blank">
                <i class="fab fa-youtube"></i> YouTube
            </a>

            <a href="https://www.tiktok.com/@kava1ari" class="link-btn btn-tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>

            <a href="https://instagram.com/kava1ari" class="link-btn btn-instagram" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <a href="https://twitter.com/kava1ari" class="link-btn btn-twitter" target="_blank">
                <i class="fab fa-x-twitter"></i> Twitter / X
            </a>

            <a href="DEIN_DISCORD_INVITE_LINK" class="link-btn btn-discord" target="_blank">
                <i class="fab fa-discord"></i> Discord
            </a>
        </div>
    </div>

</body>
</html>
